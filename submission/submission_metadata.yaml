ai_usage_summary: |
AI tools were used during development mainly as assistants for debugging,
brainstorming ideas, generating initial code scaffolding, and helping with
project organization. The project still required manual integration,
testing, running the pipeline on the full 100K candidate dataset, fixing
issues, and tuning the ranking system to make everything work end-to-end.
The final ranking pipeline runs locally and fully offline.

methodology_summary: |
The project uses a multi-signal candidate ranking approach that combines
rule-based scoring with semantic similarity. Candidates are evaluated using
multiple factors including skill match, job title alignment, years of
experience fit, behavioral signals such as recruiter response rate and
activity, semantic similarity using MiniLM embeddings, and additional
signals like GitHub activity and education. A honeypot detection step is
also used to identify suspicious or inconsistent profiles. The system was
designed to process the full 100K candidate dataset efficiently while
staying within challenge runtime limits.

